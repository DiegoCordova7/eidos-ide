<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eidos - Login</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg" />
    <link rel="stylesheet" href="../src/css/layout.css" />
    <link rel="stylesheet" href="../src/css/themes.css" />
    <link rel="stylesheet" href="../src/css/pages/login/login.css" />
  </head>
  <body>
    <div class="background-pattern"></div>

    <div class="auth-container">
      <div class="logo-section">
        <div class="logo-icon" id="logoContainer">
          <img src="../assets/images/logo.svg" alt="Eidos" />
        </div>
        <h1>Eidos IDE</h1>
        <p class="subtitle">La forma esencial de la programación</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tu@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="action-button">
          <span>Iniciar Sesión</span>
          <svg
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M4 10H16M16 10L12 6M16 10L12 14"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </form>

      <div class="divider">
        <span>o</span>
      </div>

      <p class="switch-auth">
        ¿No tienes cuenta?
        <a href="register.html" class="link-primary">Regístrate aquí</a>
      </p>

      <div id="loginMessage" class="message"></div>
    </div>
    <script type="module" src="../src/js/pages/login/login.js"></script>
  </body>
</html>
