<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eidos - Registro</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg" />
    <link rel="stylesheet" href="../src/css/layout.css" />
    <link rel="stylesheet" href="../src/css/themes.css" />
    <link rel="stylesheet" href="../src/css/pages/register/register.css" />
  </head>
  <body>
    <div class="background-pattern"></div>

    <div class="auth-container">
      <div class="logo-section">
        <div class="logo-icon" id="logoContainer">
          <img
            src="../assets/images/logo.svg"
            alt="Eidos"
            height="100%"
            width="100%"
          />
        </div>
        <h1>Eidos IDE</h1>
        <p class="subtitle">La forma esencial de la programación</p>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="input-group">
          <label for="username">Nombre de usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="johndoe"
            required
            autocomplete="username"
          />
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tu@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          />
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="action-button">
          <span>Crear cuenta</span>
          <svg
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M10 4V16M16 10H4"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </form>

      <div class="divider">
        <span>o</span>
      </div>

      <p class="switch-auth">
        ¿Ya tienes cuenta?
        <a href="index.html" class="link-primary">Inicia sesión aquí</a>
      </p>

      <div id="registerMessage" class="message"></div>
    </div>
    <script src="../src/js/pages/register/register.js"></script>
  </body>
</html>
