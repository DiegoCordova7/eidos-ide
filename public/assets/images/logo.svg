        <svg width="240" height="240" viewBox="100 50 200 220" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="imperativeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#0e639c;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#1177bb;stop-opacity:1" />
            </linearGradient>
            
            <linearGradient id="functionalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
            </linearGradient>
            
            <linearGradient id="ooGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
            </linearGradient>
            
            <linearGradient id="reactiveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
            </linearGradient>
            
            <linearGradient id="concurrentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
            </linearGradient>
            
            <linearGradient id="declarativeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
            </linearGradient>
            
            <filter id="glow">
              <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          
          <!-- Círculos de fondo -->
          <g opacity="0.15">
            <circle cx="200" cy="160" r="100" fill="none" stroke="url(#imperativeGrad)" stroke-width="1.5"/>
            <circle cx="200" cy="160" r="85" fill="none" stroke="url(#functionalGrad)" stroke-width="1.5"/>
            <circle cx="200" cy="160" r="70" fill="none" stroke="url(#ooGrad)" stroke-width="1.5"/>
          </g>
          
          <!-- Hexágono central -->
          <path d="M 200 80 L 270 120 L 270 200 L 200 240 L 130 200 L 130 120 Z" 
                fill="rgba(14, 99, 156, 0.2)" 
                stroke="url(#imperativeGrad)" 
                stroke-width="3"
                stroke-linejoin="round"
                filter="url(#glow)"/>
          
          <!-- Conexiones entre nodos -->
          <g opacity="0.3">
            <line x1="200" y1="80" x2="270" y2="120" stroke="url(#functionalGrad)" stroke-width="1.5"/>
            <line x1="270" y1="120" x2="270" y2="200" stroke="url(#ooGrad)" stroke-width="1.5"/>
            <line x1="270" y1="200" x2="200" y2="240" stroke="url(#reactiveGrad)" stroke-width="1.5"/>
            <line x1="200" y1="240" x2="130" y2="200" stroke="url(#concurrentGrad)" stroke-width="1.5"/>
            <line x1="130" y1="200" x2="130" y2="120" stroke="url(#declarativeGrad)" stroke-width="1.5"/>
            <line x1="130" y1="120" x2="200" y2="80" stroke="url(#imperativeGrad)" stroke-width="1.5"/>
          </g>
          
          <!-- Nodos de paradigmas -->
          <circle cx="200" cy="80" r="18" fill="url(#imperativeGrad)" filter="url(#glow)"/>
          <path d="M 194 72 L 194 88 M 198 72 L 198 88 M 202 72 L 202 88 M 206 72 L 206 88" 
                stroke="white" stroke-width="2" stroke-linecap="round"/>
          
          <circle cx="270" cy="120" r="18" fill="url(#functionalGrad)" filter="url(#glow)"/>
          <text x="270" y="126" text-anchor="middle" fill="white" font-size="20" font-weight="bold">λ</text>
          
          <circle cx="270" cy="200" r="18" fill="url(#ooGrad)" filter="url(#glow)"/>
          <rect x="263" y="193" width="14" height="14" fill="none" stroke="white" stroke-width="2" rx="2"/>
          <circle cx="270" cy="200" r="3" fill="white"/>
          
          <circle cx="200" cy="240" r="18" fill="url(#reactiveGrad)" filter="url(#glow)"/>
          <path d="M 192 240 Q 192 232, 200 232 Q 208 232, 208 240" 
                stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M 192 240 Q 192 248, 200 248 Q 208 248, 208 240" 
                stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
          
          <circle cx="130" cy="200" r="18" fill="url(#concurrentGrad)" filter="url(#glow)"/>
          <path d="M 122 196 L 138 196 M 122 204 L 138 204" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M 130 192 L 130 208" stroke="white" stroke-width="2" stroke-linecap="round"/>
          
          <circle cx="130" cy="120" r="18" fill="url(#declarativeGrad)" filter="url(#glow)"/>
          <path d="M 124 114 L 136 114 L 136 126 L 124 126 Z" 
                fill="none" stroke="white" stroke-width="2"/>
          <path d="M 127 120 L 130 123 L 136 114" 
                stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          
          <!-- Logo "E" central -->
          <text x="200" y="172" 
                text-anchor="middle" 
                dominant-baseline="middle"
                font-size="80" 
                font-weight="bold" 
                fill="url(#imperativeGrad)"
                filter="url(#glow)"
                font-family="serif">
            Ε
          </text>
        </svg>